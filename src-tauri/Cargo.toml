[package]
name = "sh-editor"
version = "0.1.0"
description = "面向 Windows 的 Linux Shell 脚本编辑器"
edition = "2021"
build = "build.rs"

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
base64 = "0.22.1"
chrono = { version = "0.4.44", features = ["serde"] }
encoding_rs = "0.8.35"
git2 = { version = "0.20.2", features = ["vendored-libgit2", "vendored-openssl"] }
portable-pty = "0.9.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tauri = { version = "2.10.3", features = [] }
tauri-plugin-dialog = "2.7.0"
tokio = { version = "1.52.0", features = ["fs", "macros", "process", "rt-multi-thread", "time"] }
