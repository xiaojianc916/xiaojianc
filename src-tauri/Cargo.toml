[package]
name = "sh-editor"
version = "0.1.0"
description = "面向 Windows 的 Linux Shell 脚本编辑器"
edition = "2021"
build = "build.rs"

[build-dependencies]
tauri-build = { version = "2.0.4", features = [] }

[dependencies]
chrono = { version = "0.4.39", features = ["serde"] }
encoding_rs = "0.8.35"
serde = { version = "1.0.216", features = ["derive"] }
serde_json = "1.0.134"
tauri = { version = "2.1.1", features = [] }
tauri-plugin-dialog = "2.0.1"
tokio = { version = "1.42.0", features = ["fs", "macros", "process", "rt-multi-thread", "time"] }
